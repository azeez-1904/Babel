[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    ; WebSocket client
    https://github.com/Links2004/arduinoWebSockets#master
    ; OLED support (SSD1306)
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit SSD1306@^2.5.10
    ; TFT support (ST7789 / ILI9341)
    Bodmer/TFT_eSPI@^2.5.43
    ; JSON parsing
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    ; Uncomment ONE of these:
    -D USE_OLED
    ; -D USE_TFT

    ; TFT_eSPI user setup — only matters if USE_TFT:
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=2
    -D TFT_RST=4
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
